


spring:
  ai:
    openai:
      base-url: https://api.kxaug.xyz/
      chat:
        options:
          model: gpt-5.4
          temperature: 0.7

logging:
  level:
    org.springframework.web.client.RestClient: DEBUG
    org.springframework.ai: DEBUG

server:
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true
---
spring:
  datasource:
    url: jdbc:h2:file:./data/ai_chat;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: false
